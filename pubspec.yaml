name: personal_assistant
description: A personal assistant Flutter app with tasks, planner, habits, and voice assistant.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # Voice
  flutter_tts: ^3.8.5
  speech_to_text: ^6.6.0

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # File system
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.2

  # Optional (recommended for Hive models)
  build_runner: ^2.4.8
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  # Optional assets (add later if needed)
  assets:
    - assets/images/
